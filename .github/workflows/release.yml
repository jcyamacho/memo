name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run checks
        run: mise run check

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate formula source checksum
        id: formula-source
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha256="$(curl -fsSL "$url" | sha256sum | awk '{print $1}')"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v4.1
        with:
          formula-name: memo
          formula-path: Formula/memo.rb
          tag-name: ${{ github.ref_name }}
          download-url: ${{ steps.formula-source.outputs.url }}
          download-sha256: ${{ steps.formula-source.outputs.sha256 }}
          homebrew-tap: jcyamacho/homebrew-tap
          base-branch: main
          commit-message: |
            {{formulaName}} {{version}}

            Update memo formula to {{version}}.
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
